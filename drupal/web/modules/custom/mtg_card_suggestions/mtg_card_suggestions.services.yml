services:
  logger.channel.mtg_card_suggestions:
    parent: logger.channel_base
    arguments: ['mtg_card_suggestions']

  mtg_card_suggestions.suggester:
    class: Drupal\mtg_card_suggestions\Service\CardSuggester
    arguments:
      - '@ai.provider'
      - '@entity_type.manager'
      - '@logger.channel.mtg_card_suggestions'

  mtg_card_suggestions.matchup_advisor:
    class: Drupal\mtg_card_suggestions\Service\MatchupAdvisor
    arguments:
      - '@http_client'
      - '@entity_type.manager'
      - '@logger.channel.mtg_card_suggestions'
